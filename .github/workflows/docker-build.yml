name: Docker - Build and Push Images

on:
  push:
    branches:
      - production
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker-build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            image_name: supplychain-backend
            context: ./backend
            dockerfile: ./backend/Dockerfile

          - service: frontend
            image_name: supplychain-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile

          - service: simulator
            image_name: supplychain-simulator
            context: ./simulator
            dockerfile: ./simulator/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Convert repository owner to lowercase
        id: owner
        run: |
          echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/${{ matrix.image_name }}:latest
            ghcr.io/${{ steps.owner.outputs.owner_lc }}/${{ matrix.image_name }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=/api