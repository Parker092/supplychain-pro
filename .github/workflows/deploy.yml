name: Deploy to GCP Compute Engine VM

on:
  workflow_run:
    workflows:
      - Docker - Build and Push Images
    types:
      - completed

  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Docker Compose stack on VM
    runs-on: ubuntu-latest

    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          script: |
            set -e

            cd /opt/supplychain/app

            git fetch origin
            git checkout production
            git reset --hard origin/production
            git clean -fd

            docker compose -f docker-compose.prod.yml pull

            docker compose -f docker-compose.prod.yml up -d --force-recreate backend frontend simulator nginx

            docker compose -f docker-compose.prod.yml ps

            echo "Waiting for backend health through Nginx..."

            for i in {1..30}; do
              if curl -f http://localhost/health; then
                echo "Health check passed"
                exit 0
              fi

              echo "Health check failed. Retrying in 5 seconds..."
              sleep 5
            done

            echo "Health check failed after retries"
            echo "Backend logs:"
            docker logs supplychainpro-backend --tail 100

            echo "Nginx logs:"
            docker logs supplychainpro-nginx --tail 100

            exit 1